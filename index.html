<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="app-wrapper">
        <!-- header:contains logo and text -->
        <header class="header">
            <div class="logo">
                <h1 class="logotext">w<span>O</span>rdly</h1>
                <span class="logoicon">📚</span>
            </div>
        </header>

        <!-- Content  -->
        <main class="content" id="content">
            <!-- two divs appearing side by side -->
            <div class="main-layout">
                <!-- Search Container on the left side -->
                <div class="search-container">
                    <div class="prompt" id="prompt">
                        <p class="prompt-text">Enter a word 👇</p>
                    </div>
                    <!-- Form -->
                    <div class="form">
                        <form id="form">
                            <input type="text" id="text-input" name="text-input" placeholder="Type a word..." required>
                            <button id="searchBtn" type="submit">Search</button>
                        </form>
                    </div>
                </div>

                <!-- Results Container on the right side -->
                <!-- To show an image which is later hidden after results are displeyd -->
                <div class="results-container">
                    <!-- Initial image -->
                    <img id="initial-image" src="dictionary-bckgrnd.png" alt="Image with word Dictionary written">

                    <!-- Loading -->
                    <div class="state loading-state hidden" id="loading-state">
                        <span class="loading">
                            Gettin Word<span class="dots"><span>.</span><span>.</span><span>.</span></span>
                        </span>
                    </div>

                    <!-- Error -->
                    <div class="state error-state hidden" id="error-state">
                    <p class="state-text" id="error-message">Something went wrong. Try again!</p>
                    </div>

                    <!-- Results -->
                    <div class="state result-state hidden" id="result-state">
                        <div class="word-header">
                            <h2 id="word"></h2>
                            <button id="speakerBtn">🔊</button>
                            <button id="saveBtn">⭐ Save</button>
                        </div>
                        <p id="pronunciation"></p>
                        <audio id="audio" src=""></audio>
                        <h3>Definition:</h3>
                        <ol id="definitions"></ol>
                        <!-- saved words -->
                        <h3>Saved Words:</h3>
                        <ul id="saved-words"></ul>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>



</body>

</html>
